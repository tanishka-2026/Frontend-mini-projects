<html>
    <head>
        <link rel="stylesheet" href="black.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grenze:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Blackjack</title>
    </head>
   <body>

<div class="container">

    <h1>Blackjack Game</h1>

    <div class="buttons">
        
        <div class="clear-btn">
            <img src="red.svg" alt="clear">
            <span>Clear</span>
        </div>

        <div class="start-btn">
            <img src="Rectangle 86.svg" alt="start button">
            <span>Start</span>
        </div>

        <div class="deal-btn">
            <img src="blue.svg" alt="deal">
            <span>Deal</span>
        </div>

    </div>
    <div class="cards-c">
      <div class="cards">
       <img src="card1.svg" alt="cards" class="cards card1">
       <img src="card2.svg" alt="cards" class="cards card2">
       <img src="card3.svg" alt="cards" class="cards card3">
       <img src="card4.svg" alt="cards" class="cards card4">
      </div>
    </div>
    <div class="sparkle-container">
       <div class="sparkle">
         <img src="mini.svg" alt=""> 
       </div>

       <div class="sparkle2">
         <img src="mini.svg" alt=""> 
       </div>

       <div class="sparkle3">
         <img src="mini.svg" alt=""> 
       </div>

       <div class="sparkle4">
        <img src="mini.svg" alt=""> 
       </div>
    
       <div class="sparkle5">
        <img src="star.svg" alt=""> 
       </div>

      <div class="sparkle6">
        <img src="star.svg" alt=""> 
      </div>

       <div class="sparkle7">
        <img src="star2.svg" alt=""> 
       </div>

       <div class="sparkle8">
        <img src="star2.svg" alt=""> 
       </div>

       <div class="sparkle9">
        <img src="star.svg" alt=""> 
       </div>

       <div class="sparkle10">
        <img src="star2.svg" alt=""> 
       </div>
    </div> 

    <div class="ribbon">
     <img src="ribbon.svg" alt="Ribbon">
     <span>Don't go over 21!</span>
    </div>





</div>

</body>

        <script src="black.js"></script>
    </body>
</html>
