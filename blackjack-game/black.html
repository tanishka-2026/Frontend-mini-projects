<html>
    <head>
        <link rel="stylesheet" href="black.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Grenze:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Blackjack</title>
    </head>
   <body>

<div class="container">

    <h1>Blackjack Game</h1>

    <div class="buttons">
        
        <div class="clear-btn">
            <img src="red.svg" alt="clear">
            <span>Clear</span>
        </div>

        <div class="start-btn">
            <img src="Rectangle 86.svg" alt="start button">
            <span>Start</span>
        </div>

        <div class="deal-btn">
            <img src="blue.svg" alt="deal">
            <span>Deal</span>
        </div>

    </div>

    <div class="cards">
       <img src="card1.svg" alt="cards" class="cards card1">
       <img src="card2.svg" alt="cards" class="cards card2">
       <img src="card3.svg" alt="cards" class="cards card3">
       <img src="card4.svg" alt="cards" class="cards card4">
    </div>

    <div class="banner">

        Don't Go Over 21!

    </div>

    <div class="game-info">

        <h2>Cards:</h2>

        <h2>Sum:</h2>

        <p id="message"></p>

    </div>

</div>

</body>

        <script src="black.js"></script>
    </body>
</html>
